<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Tops · ONOFRE / GRAF</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* El mapa en si es manté fosc (convenció de radar meteorològic: cal
       contrast per llegir intensitats), però la resta de la interfície
       segueix la paleta real de gencat.cat: capçalera gris fosc/carbó + vermell d'accent. */
    --bg: #0a1216; --map-bg: #050a0d;
    --panel: #ffffff; --panel-border: #d5d5d5;
    --text: #262626; --text-dim: #5a5a5a;
    --charcoal: #2b2b2b; --charcoal-2: #3c3c3c;
    --red: #C8102E; --red-dark: #96001f;
    --font-ui: 'Roboto', sans-serif; --font-mono: 'Roboto Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:var(--bg); color:#eef0f1; font-family:var(--font-ui); overflow:hidden; }

  /* ---- Pantalla de contrasenya ---- */
  #gate{
    position:fixed; inset:0; z-index:2000; background:var(--charcoal);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  #gate .mark{ font-family:var(--font-mono); font-size:12px; letter-spacing:0.1em; color:#fff;
    border:1px solid rgba(255,255,255,0.35); padding:4px 10px; border-radius:3px; background:rgba(255,255,255,0.08); }
  #gate h1{ font-size:18px; font-weight:500; margin:0; color:#fff; }
  #gate form{ display:flex; gap:8px; }
  #gate input{
    font-family:var(--font-ui); font-size:14px; background:#fff; border:1px solid rgba(255,255,255,0.4);
    color:var(--text); padding:10px 12px; border-radius:4px; width:200px;
  }
  #gate input:focus-visible{ outline:2px solid var(--red); outline-offset:2px; }
  #gate button{
    font-family:var(--font-ui); font-size:13px; color:#fff; background:var(--red);
    border:none; border-radius:4px; padding:10px 16px; cursor:pointer; font-weight:500;
  }
  #gate button:hover{ background:var(--red-dark); }
  #gate .error{ color:#ffb4a8; font-family:var(--font-ui); font-size:12px; min-height:16px; }
  #app{ display:none; }
  #app.visible{ display:block; }

  #map { position:absolute; inset:0; background:var(--map-bg); }
  .leaflet-container { background:var(--map-bg); }

  #topbar{
    position:absolute; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between; padding: 14px 20px;
    background: var(--charcoal);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  #topbar .brand{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  #topbar .brand .mark{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; color:var(--red);
    border:1px solid var(--red-dark); padding:3px 8px; border-radius:3px; background:rgba(200,16,46,0.12);
  }
  #topbar h1{ font-size:16px; font-weight:500; margin:0; letter-spacing:0.01em; color:#fff; }
  #topbar .subtitle{ font-family:var(--font-ui); font-size:12px; color:rgba(255,255,255,0.65); margin-left:2px; }

  #status{
    font-family:var(--font-mono); font-size:12px; color:#fff;
    display:flex; align-items:center; gap:8px; background: rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
    padding:6px 12px; border-radius:4px;
  }
  #status .dot{ width:7px; height:7px; border-radius:50%; background:#5fd97e; box-shadow:0 0 6px #5fd97e; }
  #status .dot.stale{ background:rgba(255,255,255,0.4); box-shadow:none; }

  #legend{
    position:absolute; top:68px; right:20px; z-index:1000;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:2px;
    padding:10px 12px; font-family:var(--font-ui); font-size:11px; color:var(--text-dim); width:150px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #legend .title{ color:var(--text); font-size:10px; letter-spacing:0.06em; margin-bottom:8px; text-transform:uppercase; font-weight:500; }
  #legend .bar{ height:10px; border-radius:2px; margin-bottom:6px;
    background: linear-gradient(90deg, #30123b, #3e4989, #26838f, #6ece58, #fde725, #ff5a5a); }
  #legend .scale{ display:flex; justify-content:space-between; }

  #timeline-wrap{
    position:absolute; left:0; right:0; bottom:0; z-index:1000; padding: 14px 20px 18px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.0) 100%);
  }
  #timeline-panel{ background:var(--panel); border:1px solid var(--panel-border); border-radius:4px; padding:12px 16px; max-width:820px; margin:0 auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
  #timeline-readout{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  #timeline-readout .ts{ font-family:var(--font-mono); font-size:20px; font-weight:700; color:var(--red); letter-spacing:0.01em; }
  #timeline-readout .ts .date{ color:var(--text-dim); font-size:13px; font-weight:400; margin-right:8px; }
  #playbtn{
    font-family:var(--font-ui); font-size:12px; color:var(--red); background:transparent;
    border:1px solid var(--red); border-radius:4px; padding:6px 14px; cursor:pointer; font-weight:500;
  }
  #playbtn:hover{ background:var(--red); color:#fff; }

  #scrubber{ -webkit-appearance:none; width:100%; height:26px; background:transparent; cursor:pointer; }
  #scrubber::-webkit-slider-runnable-track{ height:3px; background:#dde3e7; border-radius:2px; }
  #scrubber::-webkit-slider-thumb{
    -webkit-appearance:none; margin-top:-7px; width:17px; height:17px; border-radius:50%;
    background:var(--red); border:2px solid #fff; box-shadow:0 0 0 1px var(--red-dark);
  }

  #date-select{
    font-family:var(--font-ui); font-size:12px; color:var(--text); background:#fff;
    border:1px solid rgba(255,255,255,0.4); border-radius:4px; padding:5px 8px; margin-left:6px;
  }
  #live-btn{
    font-family:var(--font-ui); font-size:11px; color:#fff; background:var(--red);
    border:none; border-radius:4px; padding:6px 12px; margin-left:8px; cursor:pointer; font-weight:500;
  }
  #live-btn:hover{ background:var(--red-dark); }

  @media (max-width: 640px){
    #legend{ display:none; }
    #topbar h1{ font-size:13px; }
    #timeline-readout .ts{ font-size:16px; }
  }
</style>
</head>
<body>

<div id="gate">
  <span class="mark">BOMBERS · GRAF · CTFC</span>
  <h1>Echo Tops — accés restringit</h1>
  <form id="gate-form">
    <input type="password" id="gate-input" placeholder="Contrasenya" autocomplete="off" />
    <button type="submit">Entrar</button>
  </form>
  <div class="error" id="gate-error"></div>
</div>

<div id="app">
  <div id="map"></div>
  <div id="topbar">
    <div class="brand">
      <span class="mark">BOMBERS · GRAF</span>
      <h1>Echo Tops<span class="subtitle">&nbsp;/ radar esnjr · CTFC</span></h1>
      <select id="date-select"></select>
      <button id="live-btn" style="display:none;">● TORNAR A VIU</button>
    </div>
    <div id="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">carregant…</span>
    </div>
  </div>
  <div id="legend">
    <div class="title">Alçada echo top</div>
    <div class="bar"></div>
    <div class="scale"><span>0 km</span><span>15 km</span></div>
  </div>
  <div id="timeline-wrap">
    <div id="timeline-panel">
      <div id="timeline-readout">
        <span class="ts"><span class="date" id="ts-date">--/--/----</span><span id="ts-time">--:--</span> UTC</span>
        <button id="playbtn">▶ REPRODUIR</button>
      </div>
      <input type="range" id="scrubber" min="0" max="0" value="0" step="1" />
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ---- Pantalla de contrasenya (protecció bàsica, no és seguretat forta) ----
// Hash SHA-256 de la contrasenya triada. Genera'l amb:
//   echo -n "la_teva_contrasenya" | sha256sum
const PASSWORD_HASH = "2690c509bd0fb7fad0cf5266990c405155ebaed153af31d29f2ebfe45ad70a15";

// Declarat aquí dalt (i no just abans de la funció initMap) perquè les
// crides automàtiques a initMap() de més avall puguin accedir-hi sense
// error de "cannot access before initialization".
let mapInitialized = false;

async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const gate = document.getElementById('gate');
const app = document.getElementById('app');

async function tryUnlock(pw){
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH){
    localStorage.setItem('echotops_auth', hash);
    gate.style.display = 'none';
    app.classList.add('visible');
    initMap();
    return true;
  }
  return false;
}

document.getElementById('gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('gate-input').value;
  const ok = await tryUnlock(pw);
  if (!ok) document.getElementById('gate-error').textContent = 'Contrasenya incorrecta';
});

(async () => {
  const saved = localStorage.getItem('echotops_auth');
  if (saved === PASSWORD_HASH){
    gate.style.display = 'none';
    app.classList.add('visible');
    initMap();
  }
})();

// ---- Visor (només s'inicialitza un cop desbloquejat) ----
function initMap(){
  if (mapInitialized) return;
  mapInitialized = true;

  const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([41.6, 1.6], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 12, subdomains: 'abcd' }).addTo(map);

  let manifest = { timestamps: [], bounds: {} };
  let visibleTimestamps = [];   // el subconjunt que controla l'scrubber ara mateix
  let mode = 'live';            // 'live' (últimes 48h) | 'archive' (un dia concret)
  let currentOverlay = null;
  let playing = false;
  let playTimer = null;
  const HORES_EN_VIU = 48;

  const scrubber = document.getElementById('scrubber');
  const playbtn = document.getElementById('playbtn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const tsDate = document.getElementById('ts-date');
  const tsTime = document.getElementById('ts-time');
  const dateSelect = document.getElementById('date-select');
  const liveBtn = document.getElementById('live-btn');

  function fmtTs(ts){
    const y = ts.slice(0,4), mo = ts.slice(4,6), d = ts.slice(6,8);
    const h = ts.slice(9,11), mi = ts.slice(11,13);
    return { date: `${d}/${mo}/${y}`, time: `${h}:${mi}` };
  }

  function tsToDate(ts){
    // ts: YYYYMMDD_HHMM (UTC) -> objecte Date
    const y = +ts.slice(0,4), mo = +ts.slice(4,6)-1, d = +ts.slice(6,8);
    const h = +ts.slice(9,11), mi = +ts.slice(11,13);
    return new Date(Date.UTC(y, mo, d, h, mi));
  }

  function showFrame(index){
    if (!visibleTimestamps.length) return;
    index = Math.max(0, Math.min(index, visibleTimestamps.length - 1));
    const ts = visibleTimestamps[index];
    const { date, time } = fmtTs(ts);
    tsDate.textContent = date;
    tsTime.textContent = time;
    scrubber.max = visibleTimestamps.length - 1;
    scrubber.value = index;

    const bounds = manifest.bounds[ts];
    if (currentOverlay) map.removeLayer(currentOverlay);
    currentOverlay = L.imageOverlay(`data/png/${ts}.png`, bounds, { opacity: 0.85 }).addTo(map);
  }

  function goLive(){
    mode = 'live';
    liveBtn.style.display = 'none';
    if (!manifest.timestamps.length) { visibleTimestamps = []; return; }
    const darrer = tsToDate(manifest.timestamps[manifest.timestamps.length - 1]);
    const cutoff = new Date(darrer.getTime() - HORES_EN_VIU * 3600 * 1000);
    visibleTimestamps = manifest.timestamps.filter(ts => tsToDate(ts) >= cutoff);
    dateSelect.value = manifest.timestamps[manifest.timestamps.length - 1].slice(0, 8);
    showFrame(visibleTimestamps.length - 1);
    statusText.textContent = `En viu · últimes ${HORES_EN_VIU}h · ${visibleTimestamps.length} frames`;
  }

  function goToDay(dia){
    mode = 'archive';
    liveBtn.style.display = 'inline-block';
    visibleTimestamps = manifest.timestamps.filter(ts => ts.startsWith(dia));
    showFrame(0);
    const label = `${dia.slice(6,8)}/${dia.slice(4,6)}/${dia.slice(0,4)}`;
    statusText.textContent = `Arxiu · ${label} · ${visibleTimestamps.length} frames`;
  }

  function populateDateSelect(){
    const dies = [...new Set(manifest.timestamps.map(ts => ts.slice(0,8)))];
    dateSelect.innerHTML = dies.map(d => {
      const label = `${d.slice(6,8)}/${d.slice(4,6)}`;
      return `<option value="${d}">${label}</option>`;
    }).join('');
    dateSelect.value = dies[dies.length - 1];
  }

  dateSelect.addEventListener('change', () => goToDay(dateSelect.value));
  liveBtn.addEventListener('click', goLive);

  scrubber.addEventListener('input', () => {
    playing = false;
    playbtn.textContent = '▶ REPRODUIR';
    clearInterval(playTimer);
    showFrame(parseInt(scrubber.value, 10));
  });

  playbtn.addEventListener('click', () => {
    playing = !playing;
    playbtn.textContent = playing ? '⏸ PAUSA' : '▶ REPRODUIR';
    if (playing){
      playTimer = setInterval(() => {
        let next = parseInt(scrubber.value, 10) + 1;
        if (next >= visibleTimestamps.length) next = 0;
        showFrame(next);
      }, 800);
    } else {
      clearInterval(playTimer);
    }
  });

  async function loadManifest(){
    try{
      const res = await fetch(`data/png/manifest.json?_=${Date.now()}`);
      manifest = await res.json();
      statusDot.className = 'dot';
      populateDateSelect();
      if (mode === 'live') goLive();  // manté la vista 'en viu' actualitzada; no toca si estàs mirant l'arxiu
    }catch(e){
      statusDot.className = 'dot stale';
      statusText.textContent = 'error carregant dades';
      console.error(e);
    }
  }

  loadManifest();
  setInterval(loadManifest, 5 * 60 * 1000); // GitHub Actions actualitza cada ~10 min
}
</script>
</body>
</html>
